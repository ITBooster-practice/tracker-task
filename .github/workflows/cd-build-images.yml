name: Сборка и публикация stage-образов

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref для сборки
        required: false
        default: main
        type: string

concurrency:
  group: build-stage-images-${{ github.event_name }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAMESPACE: ${{ github.repository_owner }}
      STAGE_API_URL: https://stage.easy-tasktraker.ru/api

    steps:
      - name: Checkout коммита workflow
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Checkout ручного ref
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Определение метаданных сборки
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            commit_sha="${{ github.event.workflow_run.head_sha }}"
          else
            commit_sha="$(git rev-parse HEAD)"
          fi

          short_sha="$(git rev-parse --short=7 "$commit_sha")"
          release_tag="$(git describe --tags --abbrev=0 --match 'v*' "$commit_sha")"
          image_tag="release-${release_tag}-sha-$short_sha"

          api_tags="$REGISTRY/$IMAGE_NAMESPACE/tracker-api:$image_tag"
          web_tags="$REGISTRY/$IMAGE_NAMESPACE/tracker-web:$image_tag"

          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "image_tag=$image_tag" >> "$GITHUB_OUTPUT"
          echo "api_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$api_tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "web_tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "$web_tags" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Настройка Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Вход в GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Сборка и push API-образа
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.api_tags }}
          cache-from: type=gha,scope=tracker-api
          cache-to: type=gha,mode=max,scope=tracker-api

      - name: Сборка и push WEB-образа
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.STAGE_API_URL }}
          tags: ${{ steps.meta.outputs.web_tags }}
          cache-from: type=gha,scope=tracker-web
          cache-to: type=gha,mode=max,scope=tracker-web

      - name: Запись итогов job
        shell: bash
        run: |
          {
            echo "## Сборка stage-образов"
            echo
            echo "- Коммит: ${{ steps.meta.outputs.commit_sha }}"
            echo "- Релизный тег: ${{ steps.meta.outputs.release_tag }}"
            echo "- Тег образа: ${{ steps.meta.outputs.image_tag }}"
            echo "- API-образ: ghcr.io/${{ env.IMAGE_NAMESPACE }}/tracker-api:${{ steps.meta.outputs.image_tag }}"
            echo "- WEB-образ: ghcr.io/${{ env.IMAGE_NAMESPACE }}/tracker-web:${{ steps.meta.outputs.image_tag }}"
            echo "- Stage API URL: ${{ env.STAGE_API_URL }}"
          } >> "$GITHUB_STEP_SUMMARY"
