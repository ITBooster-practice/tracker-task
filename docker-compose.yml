# Dev-зависимости (поднимаются через `pnpm dev`).
# Проект назван явно, чтобы контейнеры не путались с stage-local-tracker-task
# и можно было держать оба стека запущенными параллельно.
name: dev-tracker-task

services:
  redis:
    image: redis:7
    container_name: dev-tracker-task-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: redis-server

  # Перехватчик исходящих писем для dev-режима.
  # SMTP на :1025, веб-интерфейс на http://localhost:8025.
  # Письма не уходят наружу — складываются в Mailpit.
  mailpit:
    image: axllent/mailpit:latest
    container_name: dev-tracker-task-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025'
      - '8025:8025'
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data

# Заменить для включения режима сохранения данных на диск
# command: redis-server --appendonly yes

volumes:
  redis_data:
  mailpit_data:
