version: '3.9'

services:
  postgres_test:
    image: postgres:16
    container_name: tracker_postgres_test
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '${POSTGRES_PORT}:5432'
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  redis_test:
    image: redis:7
    container_name: tracker_redis_test
    restart: unless-stopped
    ports:
      - '${REDIS_PORT}:6379'

volumes:
  postgres_test_data:
