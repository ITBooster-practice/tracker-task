# Локальный стек для проверки production-образов.
#
# Запуск (одной командой — сборка образов + поднятие):
#   pnpm local
# либо вручную:
#   docker compose -f docker-compose.local.yml up -d --build
#
# После первого запуска применить миграции:
#   pnpm local:migrate
# либо вручную:
#   docker compose -f docker-compose.local.yml exec api node node_modules/.bin/prisma migrate deploy
#
# Адреса после запуска:
#   http://localhost       -- веб-приложение (через Caddy)
#   http://localhost/api   -- API             (через Caddy)
#   http://localhost:8026  -- Mailpit UI (просмотр писем; :8025 занят dev-стеком)

# Имя проекта изолирует стек от dev-tracker-task
# из имён контейнеров.
name: local-tracker-task

services:
  # Reverse proxy -- имитирует Caddy на VPS
  caddy:
    image: caddy:2
    container_name: local-tracker-task-caddy
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
    depends_on:
      - api
      - web
    networks:
      - local

  # База данных
  postgres:
    image: postgres:16
    container_name: local-tracker-task-postgres
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    networks:
      - local

  # Кэш / очереди
  redis:
    image: redis:7
    container_name: local-tracker-task-redis
    restart: unless-stopped
    networks:
      - local

  # Перехватчик писем (все письма оседают здесь, наружу не уходят).
  # UI вынесен на 8026, чтобы не конфликтовать с dev-стеком (там 8025).
  mailpit:
    image: axllent/mailpit:latest
    container_name: local-tracker-task-mailpit
    restart: unless-stopped
    ports:
      - '8026:8025'
    environment:
      MP_DATABASE: /data/mailpit.db
    volumes:
      - mailpit_data:/data
    networks:
      - local

  # API
  api:
    image: tracker-api:local
    container_name: local-tracker-task-api
    pull_policy: never # образ только локальный, не тянуть из Docker Hub
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - mailpit
    env_file:
      - apps/api/.env.local
    networks:
      - local

  # Web
  web:
    image: tracker-web:local
    container_name: local-tracker-task-web
    pull_policy: never # образ только локальный, не тянуть из Docker Hub
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # URL для браузера (клиентские компоненты) — через Caddy снаружи
        NEXT_PUBLIC_API_URL: http://localhost/api
        # Включаем все фичи, чтобы проверить их в production-образе.
        NEXT_PUBLIC_FEATURE_PROJECTS: true
        NEXT_PUBLIC_FEATURE_TASKS: true
        NEXT_PUBLIC_FEATURE_TEAM_SETTINGS: true
        NEXT_PUBLIC_FEATURE_BOARDS: true
    depends_on:
      - api
    networks:
      - local

networks:
  local:

volumes:
  postgres_local_data:
  mailpit_data:
